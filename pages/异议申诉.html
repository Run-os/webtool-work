<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异议申诉 - 工具箱</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6b7280',
                    },
                }
            }
        }
    </script>
    <!-- 公共样式 -->
    <link rel="stylesheet" href="../assets/css/common.css" />
    <!-- Flowbite -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" />
</head>

<body class="min-h-screen p-4 bg-gray-900">
    <!-- 背景遮罩 -->
    <div class="fixed inset-0 -z-10 bg-black/40"></div>

    <!-- 主容器 -->
    <div class="w-full max-w-md mx-auto mt-8 mb-8">
        <!-- 卡片容器 -->
        <div class="card">
            <!-- 标题栏（带返回按钮） -->
            <div class="flex items-center justify-between py-4 px-5 bg-gray-800/90 rounded-t-lg shadow-sm">
                <a href="../index.html"
                    class="flex items-center gap-2 text-white hover:text-blue-400 transition-colors">
                    <i class="fa-solid fa-arrow-left w-4 h-4"></i>
                    <span>返回</span>
                </a>
                <div class="text-lg font-semibold text-white">异议申诉</div>
                <div class="w-8"></div>
            </div>

            <!-- 内容区域 -->
            <div class="p-5 space-y-5">

                <!-- 人员列表 -->
                <div id="personList" class="space-y-4"></div>

                <!-- 提交按钮 -->
                <button onclick="generateText()" class="btn-primary inline-flex items-center justify-center gap-2">
                    <i class="fa-solid fa-copy w-5 h-5"></i>
                    <span>生成并复制</span>
                </button>
            </div>

            <!-- 底部 -->
            <div class="px-5 py-4 border-t border-gray-700 text-xs text-gray-400">
                <p>快速生成申诉文本 · 一键复制</p>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script>
        const PERSON_GROUPS = [
            { groupName: '税源', members: ['王雨琛', '肖航辉', '谭晓悦', '未下发'] },
            { groupName: '分局', members: ['乐有为', '王文静', '李彬督', '肖磊', '未下发'] }
        ];

        function renderPersonList() {
            const container = document.getElementById('personList');
            let html = '';

            PERSON_GROUPS.forEach((group, groupIndex) => {
                html += `
                    <div class="bg-gray-700/50 rounded-lg p-4">
                        <h3 class="mb-3 text-sm font-semibold text-white flex items-center gap-2">
                            <i class="fa-solid fa-users w-4 h-4 text-blue-400"></i>
                            ${group.groupName}
                            <span class="group-total ml-auto" data-group-index="${groupIndex}">0</span>
                        </h3>
                        <div class="space-y-3">
                            ${group.members.map(name => `
                                <div class="flex items-center justify-between">
                                    <label class="text-sm text-gray-300">${name}</label>
                                    <input type="number"
                                           data-name="${name}"
                                           data-group="${group.groupName}"
                                           data-group-index="${groupIndex}"
                                           placeholder="数量"
                                           min="0"
                                           class="w-24 py-1.5 px-3 text-sm rounded-lg border border-gray-600 bg-gray-800 text-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // 为所有输入框添加实时更新事件
            document.querySelectorAll('input[data-group-index]').forEach(input => {
                input.addEventListener('input', updateGroupTotals);
            });
        }

        function generateText() {
            const inputs = document.querySelectorAll('input[data-name]');
            const validEntries = [];

            inputs.forEach(input => {
                const value = input.value.trim();
                if (value && parseInt(value) > 0) {
                    validEntries.push({
                        name: input.dataset.name,
                        count: parseInt(value),
                        group: input.dataset.group || ''
                    });
                }
            });

            if (!validEntries.length) {
                showToast('请至少填写一个数量！');
                return;
            }

            const resultLines = validEntries.map((e, i) => {
                if (e.name === '未下发') {
                    return `${i + 1}. ${e.group}存在 ${e.count} 条暂未处理人员的任务`;
                }
                return `${i + 1}. ${e.name}名下存在 ${e.count} 条任务`;
            });

            let resultText = '【异议申诉】\n' + resultLines.join('\n') + '\n请尽快完成[社会社会]';

            copyToClipboard(resultText,
                () => showToast('已复制到剪贴板！'),
                () => showToast('复制失败')
            );
        }

        // 初始化
        renderPersonList();
    </script>
</body>

</html>
