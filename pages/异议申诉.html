<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异议申诉 - 工具箱</title>
    <script src="../assets/js/common.js"></script>
</head>

<body class="min-h-screen p-4 md:p-8">
    <!-- 主容器 -->
    <div class="w-full max-w-lg mx-auto mt-4 md:mt-12 mb-8">
        <!-- 卡片容器 -->
        <div class="card">
            <!-- 标题栏（带返回按钮） -->
            <div class="card-header">
                <a href="../index.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>返回</span>
                </a>
                <div class="card-header-title">
                    <i class="fa-solid fa-chart-bar"></i>
                    <span>异议申诉</span>
                </div>
                <div class="w-16"></div>
            </div>

            <!-- 内容区域 -->
            <div class="card-content space-y-4">

                <!-- 人员列表 -->
                <div id="personList" class="space-y-2"></div>

                <!-- 提交按钮 -->
                <button onclick="generateText()" class="btn-success">
                    <i class="fa-solid fa-copy"></i>
                    <span>生成并复制</span>
                </button>
            </div>

            <!-- 底部 -->
            <div class="card-footer">
                <p>快速生成申诉文本 · 一键复制</p>
            </div>
        </div>
    </div>

    <script>
        const PERSON_GROUPS = [
            { groupName: '税源', members: ['王雨琛', '肖航辉', '谭晓悦', '未下发'] },
            { groupName: '分局', members: ['乐有为', '王文静', '李彬督', '肖磊', '未下发'] }
        ];

        function renderPersonList() {
            const container = document.getElementById('personList');
            let html = '';

            PERSON_GROUPS.forEach((group, groupIndex) => {
                html += `
                    <div class="group-container">
                        <h3 class="group-header">
                            <i class="fa-solid fa-users"></i>
                            ${group.groupName}
                            <span class="group-total" data-group-index="${groupIndex}">0</span>
                        </h3>
                        <div class="space-y-1">
                            ${group.members.map(name => `
                                <div class="input-row">
                                    <label>${name}</label>
                                    <input type="number"
                                           data-name="${name}"
                                           data-group="${group.groupName}"
                                           data-group-index="${groupIndex}"
                                           placeholder="数量"
                                           min="0">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // 为所有输入框添加实时更新事件
            document.querySelectorAll('input[data-group-index]').forEach(input => {
                input.addEventListener('input', updateGroupTotals);
            });
        }

        function generateText() {
            const inputs = document.querySelectorAll('input[data-name]');
            const validEntries = [];

            inputs.forEach(input => {
                const value = input.value.trim();
                if (value && parseInt(value) > 0) {
                    validEntries.push({
                        name: input.dataset.name,
                        count: parseInt(value),
                        group: input.dataset.group || ''
                    });
                }
            });

            if (!validEntries.length) {
                showToast('请至少填写一个数量！');
                return;
            }

            const resultLines = validEntries.map((e, i) => {
                if (e.name === '未下发') {
                    return `${i + 1}. ${e.group}存在 ${e.count} 条暂未处理人员的任务`;
                }
                return `${i + 1}. ${e.name}名下存在 ${e.count} 条任务`;
            });

            let resultText = '【异议申诉】\n' + resultLines.join('\n') + '\n请尽快完成[社会社会]';

            copyToClipboard(resultText,
                () => showToast('已复制到剪贴板！'),
                () => showToast('复制失败')
            );
        }

        // 初始化
        renderPersonList();
    </script>
</body>

</html>
