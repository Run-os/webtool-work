<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日必看 - 工具箱</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 公共样式 -->
    <link rel="stylesheet" href="../assets/css/common.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body class="min-h-screen p-4 md:p-8">
    <!-- 主容器 -->
    <div class="w-full max-w-lg mx-auto mt-4 md:mt-12 mb-8">
        <!-- 卡片容器 -->
        <div class="card">
            <!-- 标题栏（带返回按钮） -->
            <div class="card-header">
                <a href="../index.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>返回</span>
                </a>
                <div class="card-header-title">
                    <i class="fa-solid fa-file-text"></i>
                    <span>每日必看</span>
                </div>
                <div class="w-16"></div>
            </div>

            <!-- 内容区域 -->
            <div class="card-content space-y-4">

                <!-- 人员列表 -->
                <div id="personList" class="space-y-3"></div>

                <!-- 提交按钮 -->
                <button onclick="generateText()" class="btn-success">
                    <i class="fa-solid fa-copy"></i>
                    <span>生成并复制</span>
                </button>
            </div>

            <!-- 底部 -->
            <div class="card-footer">
                <p>快速生成每日提醒 · 一键复制</p>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="../assets/js/common.js"></script>
    <script>
        const PERSON_GROUPS = [
            { groupName: '新办户', members: ['分局', '税源'] },
            { groupName: '网格化', members: ['乐有为', '王文静', '李彬督', '肖磊'] }
        ];

        function renderPersonList() {
            const container = document.getElementById('personList');
            let html = '';

            PERSON_GROUPS.forEach((group, groupIndex) => {
                html += `
                    <div class="group-container">
                        <h3 class="group-header">
                            <i class="fa-solid fa-users"></i>
                            ${group.groupName}
                            <span class="group-total" data-group-index="${groupIndex}">0</span>
                        </h3>
                        <div class="space-y-2">
                            ${group.members.map(name => `
                                <div class="input-row">
                                    <label>${name}</label>
                                    <input type="number"
                                           data-name="${name}"
                                           data-group="${group.groupName}"
                                           data-group-index="${groupIndex}"
                                           placeholder="数量"
                                           min="0">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // 为所有输入框添加实时更新事件
            document.querySelectorAll('input[data-group-index]').forEach(input => {
                input.addEventListener('input', updateGroupTotals);
            });
        }

        function generateText() {
            const inputs = document.querySelectorAll('input[data-name]');
            const groupData = {};

            // 按组收集数据
            inputs.forEach(input => {
                const value = input.value.trim();
                if (value && parseInt(value) > 0) {
                    const group = input.dataset.group;
                    const name = input.dataset.name;
                    if (!groupData[group]) {
                        groupData[group] = [];
                    }
                    groupData[group].push({ name, count: parseInt(value) });
                }
            });

            if (Object.keys(groupData).length === 0) {
                showToast('请至少填写一个数量！');
                return;
            }

            let resultLines = [];

            // 新办户组：特殊格式
            if (groupData['新办户'] && groupData['新办户'].length > 0) {
                resultLines.push('【新办户】');
                const xbhItems = groupData['新办户'].map(e => `${e.name}有 ${e.count} 户`).join('、');
                resultLines.push(xbhItems);
            }

            // 网格化组：带编号列表
            if (groupData['网格化'] && groupData['网格化'].length > 0) {
                resultLines.push('【网格化】');
                groupData['网格化'].forEach((e, i) => {
                    resultLines.push(`${i + 1}. ${e.name}账号下有${e.count}条任务`);
                });
            }

            resultLines.push('请分局、税源做好税费种，并尽快处理网格化任务 [社会社会]');

            const resultText = resultLines.join('\n');

            copyToClipboard(resultText,
                () => showToast('已复制到剪贴板！'),
                () => showToast('复制失败')
            );
        }

        // 初始化
        renderPersonList();
    </script>
</body>

</html>
